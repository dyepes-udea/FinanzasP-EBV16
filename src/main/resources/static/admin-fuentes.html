<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Administración de Fuentes de Ingreso</title>
  <link rel="stylesheet" href="/css/admin-fuentes.css">
</head>
<body>
  <div class="container">
    <h1>Administración de Fuentes de Ingreso</h1>
    <p class="subtitle">Gestiona tus fuentes personalizadas de ingresos</p>

    <section class="panel" id="createPanel">
      <h2>Crear fuente de ingreso</h2>
      <form id="createForm">
        <input id="newNombre" placeholder="Nombre de la fuente (ej: Salario, Freelance, Inversiones)" required />
        <textarea id="newDescripcion" placeholder="Descripción (opcional)"></textarea>
        <button type="submit">Crear fuente</button>
      </form>
    </section>

    <section class="panel" id="listPanel">
      <h2>Fuentes de ingreso existentes</h2>
      <table id="fuentesTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="fuentesBody"></tbody>
      </table>
    </section>

    <div id="message" class="hidden"></div>
  </div>

  <script src="/js/admin-fuentes.js" defer></script>
</body>
</html>
