<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registro de usuario</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f8fbff 0%, #eef6f1 48%, #fff7ed 100%);
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .registro {
      width: 100%;
      max-width: 430px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 18px 40px rgba(31, 41, 55, 0.12);
      padding: 2rem;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.35rem;
    }

    .subtitulo {
      color: #64748b;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 0.85rem;
      border: 1px solid #dbe4ee;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: #2a9d8f;
      box-shadow: 0 0 0 4px rgba(42, 157, 143, 0.12);
    }

    button {
      width: 100%;
      padding: 0.82rem;
      border: none;
      border-radius: 9px;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
      font-weight: 750;
      cursor: pointer;
      margin-top: 0.35rem;
    }

    button:hover {
      background: #2d2d50;
    }

    .volver {
      display: inline-block;
      margin-top: 1rem;
      color: #2563eb;
      text-decoration: none;
      font-weight: 650;
    }

    .mensaje {
      display: none;
      margin-top: 1rem;
      padding: 0.9rem;
      border-radius: 8px;
      line-height: 1.35;
      font-weight: 650;
    }

    .mensaje.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .mensaje.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <main class="registro">
    <h1>Crear cuenta</h1>
    <p class="subtitulo">Registra tu correo y contrasena para crear una cuenta en la aplicacion.</p>

    <form id="registroForm">
      <div class="form-group">
        <label for="correo">Correo electronico</label>
        <input id="correo" name="correo" type="text" placeholder="correo@ejemplo.com">
      </div>

      <div class="form-group">
        <label for="contrasena">Contrasena</label>
        <input id="contrasena" name="contrasena" type="password" placeholder="Ingresa una contrasena">
      </div>

      <button type="submit">Registrarme</button>
    </form>

    <div id="mensaje" class="mensaje"></div>
    <a class="volver" href="login.html">Ya tengo cuenta</a>
    <a class="volver" href="index.html">Volver al inicio</a>
  </main>

  <script>
    const form = document.getElementById('registroForm');
    const mensaje = document.getElementById('mensaje');

    function mostrarMensaje(texto, tipo) {
      mensaje.textContent = texto;
      mensaje.className = 'mensaje ' + tipo;
    }

    async function obtenerMensajeError(res) {
      const text = await res.text().catch(() => '');
      if (!text) return 'No se pudo crear la cuenta';

      try {
        const error = JSON.parse(text);
        return error.detalles || error.mensaje || text;
      } catch (e) {
        return text;
      }
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();

      const correo = document.getElementById('correo').value.trim();
      const contrasena = document.getElementById('contrasena').value;
      const correoValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo);

      if (!correoValido) {
        mostrarMensaje('El correo no es valido', 'error');
        return;
      }

      if (!contrasena.trim()) {
        mostrarMensaje('La contrasena es obligatoria', 'error');
        return;
      }

      try {
        const res = await fetch('/api/auth/registro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ correo, contrasena })
        });

        if (res.status === 201) {
          const data = await res.json();
          mostrarMensaje(data.mensaje || 'Cuenta creada exitosamente', 'success');
          form.reset();
          return;
        }

        mostrarMensaje(await obtenerMensajeError(res), 'error');
      } catch (err) {
        mostrarMensaje('No se pudo conectar con el servidor', 'error');
      }
    });
  </script>
</body>
</html>
