<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transacciones</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── PAGE WRAPPER ── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ── HEADER ── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.8rem;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .page-header p {
      font-size: 0.9rem;
      color: #888;
      margin-top: 0.2rem;
    }

    .btn-nueva {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.65rem 1.2rem;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-nueva:hover { background: #2d2d50; }

    /* ── NAVIGATION ── */
    .nav-admin {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .nav-admin a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.65rem 1.2rem;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .nav-admin a:hover { background: #5568d3; }

    /* ── SUMMARY CARDS ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .summary-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.1rem 1.3rem;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }

    .summary-card .label {
      font-size: 0.78rem;
      color: #aaa;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.35rem;
    }

    .summary-card .amount {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .c-green { color: #16a34a; }
    .c-red   { color: #dc2626; }
    .c-blue  { color: #2563eb; }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.2rem;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: #bbb;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.62rem 0.9rem 0.62rem 2.4rem;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.9rem;
      outline: none;
      background: #fff;
      transition: border 0.2s;
    }

    .search-wrap input:focus { border-color: #1a1a2e; }

    .filter-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 0.55rem 0.9rem;
      background: #fff;
      font-size: 0.9rem;
      color: #555;
      cursor: pointer;
    }

    .filter-wrap select {
      border: none;
      outline: none;
      font-size: 0.9rem;
      color: #333;
      background: transparent;
      cursor: pointer;
    }

    /* ── TRANSACTION LIST ── */
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .tx-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.3rem;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.15s;
    }

    .tx-item:last-child { border-bottom: none; }
    .tx-item:hover { background: #fafafa; }

    /* avatar */
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
      flex-shrink: 0;
    }

    .tx-info { flex: 1; min-width: 0; }

    .tx-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tx-meta {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: 0.15rem;
    }

    .tx-right {
      text-align: right;
      flex-shrink: 0;
    }

    .tx-amount {
      font-weight: 700;
      font-size: 1rem;
    }

    .tx-badge {
      display: inline-block;
      margin-top: 0.2rem;
      font-size: 0.72rem;
      font-weight: 600;
      border-radius: 20px;
      padding: 0.1rem 0.55rem;
    }

    .badge-ingreso { background: #dcfce7; color: #16a34a; }
    .badge-gasto   { background: #fee2e2; color: #dc2626; }

    .tx-del {
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 0.3rem;
      margin-left: 0.5rem;
      transition: color 0.15s;
    }

    .tx-del:hover { color: #dc2626; }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #bbb;
      font-size: 0.95rem;
    }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 1.8rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      position: relative;
    }

    .modal h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1.4rem;
    }

    .modal-close {
      position: absolute;
      top: 1.1rem;
      right: 1.2rem;
      background: none;
      border: none;
      font-size: 1.2rem;
      color: #aaa;
      cursor: pointer;
    }

    .modal-close:hover { color: #333; }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.35rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid #e5e7eb;
      border-radius: 9px;
      font-size: 0.92rem;
      outline: none;
      transition: border 0.2s;
      background: #fff;
    }

    .form-group input:focus,
    .form-group select:focus { border-color: #1a1a2e; }

    .btn-guardar {
      width: 100%;
      padding: 0.75rem;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .btn-guardar:hover { background: #2d2d50; }

    @media (max-width: 600px) {
      .summary { grid-template-columns: 1fr; }
      .page { padding: 1.2rem 1rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- NAVIGATION -->
  <div class="nav-admin">
    <a href="/admin.html">📊 Administrar categorías</a>
    <a href="/admin-fuentes.html">💰 Administrar fuentes de ingreso</a>
  </div>

  <!-- HEADER -->
  <div class="page-header">
    <div>
      <h1>Transacciones</h1>
      <p>Gestiona tus ingresos y gastos</p>
    </div>
    <button class="btn-nueva" onclick="abrirModal()">
      <span>+</span> Nueva Transacción
    </button>
  </div>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="summary-card">
      <div class="label">Total ingresos</div>
      <div class="amount c-green" id="totalIngresos">$0.00</div>
    </div>
    <div class="summary-card">
      <div class="label">Total gastos</div>
      <div class="amount c-red" id="totalGastos">$0.00</div>
    </div>
    <div class="summary-card">
      <div class="label">Balance</div>
      <div class="amount c-blue" id="balance">$0.00</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="buscar" placeholder="Buscar transacciones..." oninput="renderLista()" />
    </div>
    <div class="filter-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
      <select id="filtro" onchange="renderLista()">
        <option value="todas">Todas</option>
        <option value="ingreso">Ingresos</option>
        <option value="gasto">Gastos</option>
      </select>
    </div>
  </div>

  <!-- LISTA -->
  <div class="card" id="lista">
    <div class="empty-state">Cargando...</div>
  </div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="cerrarSiOverlay(event)">
  <div class="modal">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <h2>Agregar Transacción</h2>
    <form id="formTx" onsubmit="guardar(event)">
      <div class="form-group">
        <label>Tipo</label>
        <select id="tipo" onchange="actualizarSelectores()">
          <option value="gasto">Gasto</option>
          <option value="ingreso">Ingreso</option>
        </select>
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <input type="text" id="desc" placeholder="Ej: Salario mensual" required />
      </div>
      <div class="form-group">
        <label id="labelCategoria">Categoría</label>
        <select id="categoria" required>
          <option value="">-- Selecciona una categoría --</option>
        </select>
      </div>
      <div class="form-group" id="fuenteGroup" style="display: none;">
        <label id="labelFuente">Fuente de ingreso</label>
        <select id="fuente">
          <option value="">-- Selecciona una fuente --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Monto</label>
        <input type="number" id="monto" placeholder="0.00" step="0.01" min="0.01" required />
      </div>
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="fecha" required />
      </div>
      <button type="submit" class="btn-guardar">Guardar Transacción</button>
    </form>
  </div>
</div>

<script>
  const API = 'http://localhost:8080/api';

  // Paleta de colores para avatares
  const COLORS = ['#6366f1','#f59e0b','#10b981','#ef4444','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16'];
  const colorMap = {};

  function avatarColor(letra) {
    const k = letra.toUpperCase();
    if (!colorMap[k]) {
      const idx = k.charCodeAt(0) % COLORS.length;
      colorMap[k] = COLORS[idx];
    }
    return colorMap[k];
  }

  const fmt = n => '$' + parseFloat(n).toLocaleString('es-CO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  let todas = []; // { ...item, tipo: 'ingreso'|'gasto' }
  let categoriasGasto = [];
  let categoriasIngreso = [];
  let fuentesIngreso = [];

  // Cargar todas las categorías y filtrarlas por tipo
  async function cargarCategorias() {
    try {
      const res = await fetch(`${API}/categorias`);
      const cats = await res.json();
      categoriasGasto = cats.filter(c => c.tipo === 'GASTO');
      categoriasIngreso = cats.filter(c => c.tipo === 'INGRESO');
    } catch (err) {
      console.error('Error cargando categorías:', err);
    }
  }

  // Cargar fuentes de ingreso
  async function cargarFuentes() {
    try {
      const res = await fetch(`${API}/fuentes-ingreso`);
      fuentesIngreso = await res.json();
    } catch (err) {
      console.error('Error cargando fuentes:', err);
    }
  }

  // Actualizar selectores al abrir modal o cambiar tipo
  function actualizarSelectores() {
    const tipo = document.getElementById('tipo').value;
    const selectCat = document.getElementById('categoria');
    const fuenteGroup = document.getElementById('fuenteGroup');

    selectCat.innerHTML = '<option value="">-- Selecciona una categoría --</option>';
    const cats = tipo === 'gasto' ? categoriasGasto : categoriasIngreso;
    cats.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat.id;
      opt.textContent = cat.nombre;
      selectCat.appendChild(opt);
    });

    // Mostrar u ocultar fuentes según tipo
    if (tipo === 'ingreso') {
      fuenteGroup.style.display = 'block';
      const selectFuente = document.getElementById('fuente');
      selectFuente.innerHTML = '<option value="">-- Selecciona una fuente (opcional) --</option>';
      fuentesIngreso.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.id;
        opt.textContent = f.nombre;
        selectFuente.appendChild(opt);
      });
    } else {
      fuenteGroup.style.display = 'none';
    }
  }

  // ────────────────────────────────────────────────────────────
  async function cargar() {
    await Promise.all([cargarCategorias(), cargarFuentes()]);
    
    const [rI, rG] = await Promise.all([
      fetch(`${API}/ingresos`),
      fetch(`${API}/gastos`)
    ]);
    const ingresos = (await rI.json()).map(i => ({ ...i, tipo: 'ingreso' }));
    const gastos   = (await rG.json()).map(g => ({ ...g, tipo: 'gasto'   }));

    todas = [...ingresos, ...gastos].sort((a, b) => b.fecha.localeCompare(a.fecha));
    actualizarResumen();
    renderLista();
  }

  function actualizarResumen() {
    const sumI = todas.filter(t => t.tipo === 'ingreso').reduce((s, t) => s + parseFloat(t.monto), 0);
    const sumG = todas.filter(t => t.tipo === 'gasto').reduce((s, t) => s + parseFloat(t.monto), 0);
    const bal  = sumI - sumG;

    document.getElementById('totalIngresos').textContent = fmt(sumI);
    document.getElementById('totalGastos').textContent   = fmt(sumG);
    const elBal = document.getElementById('balance');
    elBal.textContent = fmt(bal);
    elBal.className   = 'amount ' + (bal >= 0 ? 'c-blue' : 'c-red');
  }

  function renderLista() {
    const busq   = document.getElementById('buscar').value.toLowerCase();
    const filtro = document.getElementById('filtro').value;

    const items = todas.filter(t => {
      const matchTipo = filtro === 'todas' || t.tipo === filtro;
      const matchText = !busq ||
        (t.descripcion || '').toLowerCase().includes(busq) ||
        (t.categoria   || '').toLowerCase().includes(busq);
      return matchTipo && matchText;
    });

    const lista = document.getElementById('lista');

    if (items.length === 0) {
      lista.innerHTML = '<div class="empty-state">No se encontraron transacciones</div>';
      return;
    }

    lista.innerHTML = items.map(t => {
      const letra = (t.descripcion || '?')[0].toUpperCase();
      const color = avatarColor(letra);
      const esIngreso = t.tipo === 'ingreso';
      const amountStr = (esIngreso ? '+' : '-') + fmt(t.monto);
      const amountClass = esIngreso ? 'c-green' : 'c-red';
      const badge = esIngreso
        ? '<span class="tx-badge badge-ingreso">Ingreso</span>'
        : '<span class="tx-badge badge-gasto">Gasto</span>';
      const categoriaNombre = typeof t.categoria === 'string' ? t.categoria : (t.categoria?.nombre || '');
      const meta = [categoriaNombre, formatFecha(t.fecha)].filter(Boolean).join(' • ');

      return `
        <div class="tx-item">
          <div class="avatar" style="background:${color}">${letra}</div>
          <div class="tx-info">
            <div class="tx-name">${esc(t.descripcion)}</div>
            <div class="tx-meta">${esc(meta)}</div>
          </div>
          <div class="tx-right">
            <div class="tx-amount ${amountClass}">${amountStr}</div>
            ${badge}
          </div>
          <button class="tx-del" onclick="eliminar('${t.tipo}', ${t.id})">✕</button>
        </div>`;
    }).join('');
  }

  function formatFecha(f) {
    if (!f) return '';
    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    const [y, m, d] = f.split('-');
    return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`;
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Eliminar ─────────────────────────────────────────────────
  async function eliminar(tipo, id) {
    const endpoint = tipo === 'ingreso' ? 'ingresos' : 'gastos';
    await fetch(`${API}/${endpoint}/${id}`, { method: 'DELETE' });
    cargar();
  }

  // ── Modal ─────────────────────────────────────────────────────
  function abrirModal() {
    document.getElementById('formTx').reset();
    document.getElementById('fecha').valueAsDate = new Date();    actualizarSelectores();    document.getElementById('overlay').classList.add('open');
  }

  function cerrarModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  function cerrarSiOverlay(e) {
    if (e.target === document.getElementById('overlay')) cerrarModal();
  }

  async function guardar(e) {
    e.preventDefault();
    const tipo = document.getElementById('tipo').value;
    const endpoint = tipo === 'ingreso' ? 'ingresos' : 'gastos';
    const categoriaId = document.getElementById('categoria').value;

    if (!categoriaId) {
      alert('Debes seleccionar una categoría');
      return;
    }

    const body = {
      descripcion: document.getElementById('desc').value,
      categoriaId: parseInt(categoriaId, 10),
      monto: document.getElementById('monto').value,
      fecha: document.getElementById('fecha').value
    };

    // Agregar fuenteIngresoId si es ingreso
    if (tipo === 'ingreso') {
      const fuenteId = document.getElementById('fuente').value;
      if (fuenteId) {
        body.fuenteIngresoId = parseInt(fuenteId, 10);
      }
    }

    await fetch(`${API}/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    cerrarModal();
    cargar();
  }

  // ── Init ──────────────────────────────────────────────────────
  cargar();
</script>
</body>
</html>
