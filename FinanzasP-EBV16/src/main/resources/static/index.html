<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transacciones</title>

  <!-- React 18 + Babel Standalone (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── PAGE WRAPPER ── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ── HEADER ── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.8rem;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .page-header p {
      font-size: 0.9rem;
      color: #888;
      margin-top: 0.2rem;
    }

    .btn-nueva {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.65rem 1.2rem;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-nueva:hover { background: #2d2d50; }

    /* ── SUMMARY CARDS ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .summary-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.1rem 1.3rem;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }

    .summary-card .label {
      font-size: 0.78rem;
      color: #aaa;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.35rem;
    }

    .summary-card .amount {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .c-green { color: #16a34a; }
    .c-red   { color: #dc2626; }
    .c-blue  { color: #2563eb; }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.2rem;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: #bbb;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.62rem 0.9rem 0.62rem 2.4rem;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.9rem;
      outline: none;
      background: #fff;
      transition: border 0.2s;
    }

    .search-wrap input:focus { border-color: #1a1a2e; }

    .filter-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 0.55rem 0.9rem;
      background: #fff;
      font-size: 0.9rem;
      color: #555;
      cursor: pointer;
    }

    .filter-wrap select {
      border: none;
      outline: none;
      font-size: 0.9rem;
      color: #333;
      background: transparent;
      cursor: pointer;
    }

    /* ── TRANSACTION LIST ── */
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .tx-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.3rem;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.15s;
    }

    .tx-item:last-child { border-bottom: none; }
    .tx-item:hover { background: #fafafa; }

    /* avatar */
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
      flex-shrink: 0;
    }

    .tx-info { flex: 1; min-width: 0; }

    .tx-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tx-meta {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: 0.15rem;
    }

    .tx-right {
      text-align: right;
      flex-shrink: 0;
    }

    .tx-amount {
      font-weight: 700;
      font-size: 1rem;
    }

    .tx-badge {
      display: inline-block;
      margin-top: 0.2rem;
      font-size: 0.72rem;
      font-weight: 600;
      border-radius: 20px;
      padding: 0.1rem 0.55rem;
    }

    .badge-ingreso { background: #dcfce7; color: #16a34a; }
    .badge-gasto   { background: #fee2e2; color: #dc2626; }

    .tx-del {
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 0.3rem;
      margin-left: 0.5rem;
      transition: color 0.15s;
    }

    .tx-del:hover { color: #dc2626; }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #bbb;
      font-size: 0.95rem;
    }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 1.8rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      position: relative;
    }

    .modal h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1.4rem;
    }

    .modal-close {
      position: absolute;
      top: 1.1rem;
      right: 1.2rem;
      background: none;
      border: none;
      font-size: 1.2rem;
      color: #aaa;
      cursor: pointer;
    }

    .modal-close:hover { color: #333; }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.35rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid #e5e7eb;
      border-radius: 9px;
      font-size: 0.92rem;
      outline: none;
      transition: border 0.2s;
      background: #fff;
    }

    .form-group input:focus,
    .form-group select:focus { border-color: #1a1a2e; }

    .btn-guardar {
      width: 100%;
      padding: 0.75rem;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .btn-guardar:hover { background: #2d2d50; }

    @media (max-width: 600px) {
      .summary { grid-template-columns: 1fr; }
      .page { padding: 1.2rem 1rem; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useCallback } = React;

  const API = 'http://localhost:8080/api';
  const COLORS = ['#6366f1','#f59e0b','#10b981','#ef4444','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16'];
  const colorCache = {};

  function avatarColor(letra) {
    const k = letra.toUpperCase();
    if (!colorCache[k]) colorCache[k] = COLORS[k.charCodeAt(0) % COLORS.length];
    return colorCache[k];
  }

  const fmt = n =>
    '$' + parseFloat(n).toLocaleString('es-CO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  function formatFecha(f) {
    if (!f) return '';
    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    const [y, m, d] = f.split('-');
    return `${parseInt(d)} ${meses[parseInt(m) - 1]} ${y}`;
  }

  // ── SummaryCards ─────────────────────────────────────────────
  function SummaryCards({ transacciones }) {
    const sumI = transacciones.filter(t => t.tipo === 'ingreso').reduce((s, t) => s + parseFloat(t.monto), 0);
    const sumG = transacciones.filter(t => t.tipo === 'gasto').reduce((s, t) => s + parseFloat(t.monto), 0);
    const bal  = sumI - sumG;
    return (
      <div className="summary">
        <div className="summary-card">
          <div className="label">Total ingresos</div>
          <div className="amount c-green">{fmt(sumI)}</div>
        </div>
        <div className="summary-card">
          <div className="label">Total gastos</div>
          <div className="amount c-red">{fmt(sumG)}</div>
        </div>
        <div className="summary-card">
          <div className="label">Balance</div>
          <div className={`amount ${bal >= 0 ? 'c-blue' : 'c-red'}`}>{fmt(bal)}</div>
        </div>
      </div>
    );
  }

  // ── Toolbar ──────────────────────────────────────────────────
  function Toolbar({ busqueda, setBusqueda, filtro, setFiltro }) {
    return (
      <div className="toolbar">
        <div className="search-wrap">
          <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            placeholder="Buscar transacciones..."
            value={busqueda}
            onChange={e => setBusqueda(e.target.value)}
          />
        </div>
        <div className="filter-wrap">
          <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
          </svg>
          <select value={filtro} onChange={e => setFiltro(e.target.value)}>
            <option value="todas">Todas</option>
            <option value="ingreso">Ingresos</option>
            <option value="gasto">Gastos</option>
          </select>
        </div>
      </div>
    );
  }

  // ── TransactionItem ──────────────────────────────────────────
  function TransactionItem({ tx, onEliminar }) {
    const letra    = (tx.descripcion || '?')[0].toUpperCase();
    const color    = avatarColor(letra);
    const esIngreso = tx.tipo === 'ingreso';
    const meta     = [tx.categoria, formatFecha(tx.fecha)].filter(Boolean).join(' • ');
    return (
      <div className="tx-item">
        <div className="avatar" style={{ background: color }}>{letra}</div>
        <div className="tx-info">
          <div className="tx-name">{tx.descripcion}</div>
          <div className="tx-meta">{meta}</div>
        </div>
        <div className="tx-right">
          <div className={`tx-amount ${esIngreso ? 'c-green' : 'c-red'}`}>
            {(esIngreso ? '+' : '-') + fmt(tx.monto)}
          </div>
          <span className={`tx-badge ${esIngreso ? 'badge-ingreso' : 'badge-gasto'}`}>
            {esIngreso ? 'Ingreso' : 'Gasto'}
          </span>
        </div>
        <button className="tx-del" onClick={() => onEliminar(tx.tipo, tx.id)}>✕</button>
      </div>
    );
  }

  // ── Modal ────────────────────────────────────────────────────
  function Modal({ abierto, onCerrar, onGuardar }) {
    const hoy = new Date().toISOString().split('T')[0];
    const [tipo,        setTipo]        = useState('gasto');
    const [descripcion, setDescripcion] = useState('');
    const [categoria,   setCategoria]   = useState('');
    const [monto,       setMonto]       = useState('');
    const [fecha,       setFecha]       = useState(hoy);
    const [guardando,   setGuardando]   = useState(false);

    function reset() {
      setTipo('gasto');
      setDescripcion('');
      setCategoria('');
      setMonto('');
      setFecha(new Date().toISOString().split('T')[0]);
    }

    async function handleSubmit(e) {
      e.preventDefault();
      setGuardando(true);
      await onGuardar({ tipo, descripcion, categoria: categoria || null, monto, fecha });
      reset();
      setGuardando(false);
    }

    if (!abierto) return null;

    return (
      <div className="overlay open" onClick={e => e.target === e.currentTarget && onCerrar()}>
        <div className="modal">
          <button className="modal-close" onClick={onCerrar}>✕</button>
          <h2>Agregar Transacción</h2>
          <form onSubmit={handleSubmit}>
            <div className="form-group">
              <label>Tipo</label>
              <select value={tipo} onChange={e => setTipo(e.target.value)}>
                <option value="gasto">Gasto</option>
                <option value="ingreso">Ingreso</option>
              </select>
            </div>
            <div className="form-group">
              <label>Descripción</label>
              <input
                type="text"
                placeholder="Ej: Salario mensual"
                value={descripcion}
                onChange={e => setDescripcion(e.target.value)}
                required
              />
            </div>
            <div class="form-group">
        <label>Categoría</label>
        <input type="text" id="cat" placeholder="Ej: Salario, Alimentación..." />
      </div>
            <div className="form-group">
              <label>Monto</label>
              <input
                type="number"
                placeholder="0.00"
                step="0.01"
                min="0.01"
                value={monto}
                onChange={e => setMonto(e.target.value)}
                required
              />
            </div>
            <div className="form-group">
              <label>Fecha</label>
              <input
                type="date"
                value={fecha}
                onChange={e => setFecha(e.target.value)}
                required
              />
            </div>
            <button type="submit" className="btn-guardar" disabled={guardando}>
              {guardando ? 'Guardando...' : 'Guardar Transacción'}
            </button>
          </form>
        </div>
      </div>
    );
  }

  // ── App (componente raíz) ────────────────────────────────────
  function App() {
    const [transacciones, setTransacciones] = useState([]);
    const [busqueda,      setBusqueda]      = useState('');
    const [filtro,        setFiltro]        = useState('todas');
    const [modalAbierto,  setModalAbierto]  = useState(false);
    const [cargando,      setCargando]      = useState(true);

    const cargar = useCallback(async () => {
      setCargando(true);
      try {
        const [rI, rG] = await Promise.all([
          fetch(`${API}/ingresos`),
          fetch(`${API}/gastos`)
        ]);
        const ingresos = (await rI.json()).map(i => ({ ...i, tipo: 'ingreso' }));
        const gastos   = (await rG.json()).map(g => ({ ...g, tipo: 'gasto'   }));
        const todas    = [...ingresos, ...gastos].sort((a, b) => b.fecha.localeCompare(a.fecha));
        setTransacciones(todas);
      } catch (err) {
        console.error('Error al cargar transacciones:', err);
      } finally {
        setCargando(false);
      }
    }, []);

    useEffect(() => { cargar(); }, [cargar]);

    async function eliminar(tipo, id) {
      const endpoint = tipo === 'ingreso' ? 'ingresos' : 'gastos';
      await fetch(`${API}/${endpoint}/${id}`, { method: 'DELETE' });
      cargar();
    }

    async function guardar({ tipo, descripcion, categoria, monto, fecha }) {
      const endpoint = tipo === 'ingreso' ? 'ingresos' : 'gastos';
      await fetch(`${API}/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ descripcion, categoria, monto, fecha })
      });
      setModalAbierto(false);
      cargar();
    }

    const lista = transacciones.filter(t => {
      const matchTipo = filtro === 'todas' || t.tipo === filtro;
      const busq      = busqueda.toLowerCase();
      const matchText = !busq ||
        (t.descripcion || '').toLowerCase().includes(busq) ||
        (t.categoria   || '').toLowerCase().includes(busq);
      return matchTipo && matchText;
    });

    return (
      <div className="page">

        {/* HEADER */}
        <div className="page-header">
          <div>
            <h1>Transacciones</h1>
            <p>Gestiona tus ingresos y gastos</p>
          </div>
          <button className="btn-nueva" onClick={() => setModalAbierto(true)}>
            <span>+</span> Nueva Transacción
          </button>
        </div>

        {/* TARJETAS RESUMEN */}
        <SummaryCards transacciones={transacciones} />

        {/* BARRA DE BÚSQUEDA Y FILTRO */}
        <Toolbar
          busqueda={busqueda}
          setBusqueda={setBusqueda}
          filtro={filtro}
          setFiltro={setFiltro}
        />

        {/* LISTA DE TRANSACCIONES */}
        <div className="card">
          {cargando ? (
            <div className="empty-state">Cargando...</div>
          ) : lista.length === 0 ? (
            <div className="empty-state">No se encontraron transacciones</div>
          ) : (
            lista.map(tx => (
              <TransactionItem
                key={`${tx.tipo}-${tx.id}`}
                tx={tx}
                onEliminar={eliminar}
              />
            ))
          )}
        </div>

        {/* MODAL */}
        <Modal
          abierto={modalAbierto}
          onCerrar={() => setModalAbierto(false)}
          onGuardar={guardar}
        />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
